  graph_max_hops: 2
  graph_bidirectional: true
  graph_entity_vector_top_k: 3
  graph_entity_vector_threshold: 0.5
  graph_hop_support_threshold: 0.5
  graph_ppr_alpha: 0.85
  graph_ppr_max_iter: 64
  graph_ppr_tol: 1.0e-06
  graph_transition_mode: support
  graph_max_entities: 256
  graph_max_paths: 500
  graph_max_frontier_pops: 50000
  graph_seed_softmax_temperature: 0.1
  graph_entity_chunk_edge_weight: 0.5
generation:
  provider: openai
  model: gpt-4.1-mini
  reasoning_effort: null
  temperature: 0.0
  max_tokens: 512
  prompt_file: prompts/generator_simplified.txt
  include_graph_provenance: false
  completion_window: 24h
  batch_max_requests: 2000
e2e:
  run_id: null
  split: validation
  policy: graph-only
  policies:
  - dense-only
  - graph-only
  - 50-50
  - learned-soft
  - learned-hard
  branch_top_k: 20
  fusion_keep_k: 20
  reranker: cross_encoder
  rerank_top_k: 10
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-12-v2
  router_device: cpu
  router_input_mode: both
  router_inference_batch_size: 32
  limit: null
  only_question_ids: []
  dry_run: true
  include_graph_provenance: false
  completion_window: 24h
secrets:
  openai_api_key_env: OPENAI_API_KEY
  wikimedia_token_env: WIKIMEDIA_OAUTH2_ACCESS_TOKEN
graph_retrieval_sweep:
  grid:
    graph_seed_softmax_temperature:
    - 0.02
    - 0.05
    - 0.1
    - 0.2
    - 0.5
    graph_entity_chunk_edge_weight:
    - 0.1
    - 0.3
    - 0.5
    - 0.7
    - 0.9
    graph_ppr_alpha:
    - 0.7
    - 0.8
    - 0.9
    graph_transition_mode:
    - support
    - uniform
  objective: overlap.all.retrieval_at_k.10.ndcg
  sweep_id: graph-rag-tuning
  use_router_overlap_splits: false
