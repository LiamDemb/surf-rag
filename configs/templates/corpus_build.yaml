# Ingest, fetch, align, build-corpus stages (no oracle/router emphasis).
schema_version: surf-rag/pipeline/v1
experiment_id: corpus-refresh
seed: 42

paths:
    data_base: data
    benchmark_base: data/benchmarks
    router_base: data/router
    benchmark_name: benchmark-name
    benchmark_id: v01
    router_id: v01
    hf_home: null
    transformers_cache: null

raw_sources:
    nq_path: data/raw/nq_100.jsonl
    wiki2_path: data/raw/2wikimultihop_100.jsonl

model_setup:
    spacy_model: en_core_web_sm
    embedding_model: all-MiniLM-L6-v2
    cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-6-v2

corpus:
    max_pages: 12
    max_hops: 2
    max_list_pages: 2
    max_country_pages: 1
    chunk_min_tokens: 500
    chunk_max_tokens: 800
    chunk_overlap_tokens: 100
    fetch_missing: false

alignment:
    full_report: false
    keep_unresolved: false
    tau_sem: null
    tau_lex: null

entity_matching:
    build_artifacts: true
    force: false
    max_df: 8
    max_per_query: 12
    min_key_len: 3

oracle:
    {
        branch_top_k: 20,
        fusion_keep_k: 20,
        betas: [0.5, 1.0, 2.0],
        min_entropy_nats: 0.1,
        selected_beta: null,
    }
router: { dataset: {}, train: {} }
retrieval: {}
generation: {}
e2e: {}
secrets: {}
