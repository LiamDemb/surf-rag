# Committed pointer to the surf-bench 200-test example pipeline.
# Prefer editing a private copy if your paths diverge.
schema_version: surf-rag/pipeline/v1
experiment_id: surf-bench-200
seed: 42

paths:
  data_base: data
  benchmark_base: data/benchmarks
  router_base: data/router
  benchmark_name: surf-bench
  benchmark_id: 200-test
  router_id: 4000-test
  hf_home: null
  transformers_cache: null

raw_sources:
  nq_path: data/raw/nq_100.jsonl
  wiki2_path: data/raw/2wikimultihop_100.jsonl

model_setup:
  spacy_model: en_core_web_sm
  embedding_model: all-MiniLM-L6-v2
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-6-v2

corpus:
  max_pages: 12
  max_hops: 2
  chunk_min_tokens: 500
  chunk_max_tokens: 800
  chunk_overlap_tokens: 100
  fetch_missing: false

alignment: {}
entity_matching: { build_artifacts: true, force: false, max_df: 8, max_per_query: 12, min_key_len: 3 }

oracle:
  branch_top_k: 25
  fusion_keep_k: 25
  betas: [0.5, 1.0, 2.0, 5.0, 10.0, 20.0, 50.0]
  min_entropy_nats: 0.1

router:
  dataset:
    embedding_model: all-MiniLM-L6-v2
    train_ratio: 0.6
    dev_ratio: 0.2
    test_ratio: 0.2
  train:
    epochs: 100
    batch_size: 32
    learning_rate: 0.001
    device: cpu
    input_mode: both
    input_modes: [both, query-features, embedding]

retrieval: {}
generation: { model: gpt-4o-mini, max_tokens: 512, temperature: 0.0, prompt_file: prompts/generator.txt, completion_window: 24h, batch_max_requests: 2000 }
e2e:
  run_id: e2e-dev
  split: test
  policy: learned-soft
  reranker: cross_encoder
  rerank_top_k: 5
  router_device: cpu
  router_input_mode: both
  router_inference_batch_size: 32
secrets: { openai_api_key_env: OPENAI_API_KEY }
