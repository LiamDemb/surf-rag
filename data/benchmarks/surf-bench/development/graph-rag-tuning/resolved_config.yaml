model_setup:
  spacy_model: en_core_web_sm
  embedding_model: all-MiniLM-L6-v2
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-12-v2
corpus:
  max_pages: 12
  max_hops: 2
  max_list_pages: 2
  max_country_pages: 1
  chunk_min_tokens: 500
  chunk_max_tokens: 800
  chunk_overlap_tokens: 100
  fetch_missing: false
alignment:
  full_report: false
  keep_unresolved: false
  tau_sem: null
  tau_lex: null
entity_matching:
  build_artifacts: true
  force: false
  max_df: 8
  max_per_query: 12
  min_key_len: 3
oracle:
  branch_top_k: 20
  fusion_keep_k: 20
router:
  dataset:
    embedding_model: all-MiniLM-L6-v2
    train_ratio: 0.6
    dev_ratio: 0.2
    test_ratio: 0.2
  train:
    epochs: 100
    batch_size: 32
    learning_rate: 0.001
    device: cpu
    input_mode: both
    input_modes:
    - both
    - query-features
    - embedding
retrieval:
