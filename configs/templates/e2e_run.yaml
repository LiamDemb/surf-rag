# Focused E2E run on an existing benchmark + corpus + router.
# Usually copied under configs/e2e/<bench>/<id>/<run>.yaml
# Requires paths.*, e2e.run_id, e2e.policy, and model_setup for reranker.
schema_version: surf-rag/pipeline/v1
experiment_id: e2e-one-off
seed: 42

paths:
    data_base: data
    benchmark_base: data/benchmarks
    router_base: data/router
    benchmark_name: surf-bench
    benchmark_id: 200-test
    router_id: 4000-test
    hf_home: null
    transformers_cache: null

raw_sources:
    nq_path: data/raw/nq_100.jsonl
    wiki2_path: data/raw/2wikimultihop_100.jsonl

model_setup:
    spacy_model: en_core_web_sm
    embedding_model: all-MiniLM-L6-v2
    cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-6-v2

corpus: {}
alignment: {}
entity_matching: {}
oracle: {}
router: { dataset: {}, train: {} }
retrieval: {}
generation:
    model: gpt-4o-mini
    max_tokens: 512
    temperature: 0.0
    prompt_file: prompts/generator.txt
    completion_window: 24h
    batch_max_requests: 2000

e2e:
    run_id: my-run-id
    split: test
    policy: learned-soft
    fusion_keep_k: 20
    reranker: cross_encoder
    rerank_top_k: 5
    router_device: cpu
    router_input_mode: both
    router_inference_batch_size: 32
    limit: null
    dry_run: false

secrets:
    openai_api_key_env: OPENAI_API_KEY
