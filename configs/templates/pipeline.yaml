# Full pipeline: raw ingest through router training and E2E defaults.
# Copy to configs/pipelines/<name>.yaml and edit paths / experiment_id.
#
# See: docs/config-driven-workflows.md
schema_version: surf-rag/pipeline/v1
experiment_id: my-experiment
seed: 42

paths:
  data_base: data
  benchmark_base: data/benchmarks
  router_base: data/router
  benchmark_name: benchmark-name
  benchmark_id: v01
  router_id: v01
  hf_home: null # default: <corpus_dir>/hf_cache
  transformers_cache: null # default: <hf_home>/transformers

raw_sources:
  nq_path: data/raw/nq_100.jsonl
  wiki2_path: data/raw/2wikimultihop_100.jsonl
  nq_version: null
  wiki2_version: null

model_setup:
  spacy_model: en_core_web_sm
  embedding_model: all-MiniLM-L6-v2
  cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-6-v2

corpus:
  max_pages: 12
  max_hops: 2
  max_list_pages: 2
  max_country_pages: 1
  chunk_min_tokens: 500
  chunk_max_tokens: 800
  chunk_overlap_tokens: 100
  fetch_missing: false

alignment:
  full_report: false
  keep_unresolved: false
  tau_sem: null
  tau_lex: null

entity_matching:
  build_artifacts: true
  force: false
  max_df: 8
  max_per_query: 12
  min_key_len: 3

oracle:
  branch_top_k: 25
  fusion_keep_k: 25
  betas: [0.5, 1.0, 2.0, 5.0, 10.0, 20.0, 50.0]
  min_entropy_nats: 0.1
  selected_beta: null

router:
  dataset:
    embedding_model: all-MiniLM-L6-v2
    train_ratio: 0.6
    dev_ratio: 0.2
    test_ratio: 0.2
  train:
    epochs: 100
    batch_size: 32
    learning_rate: 0.001
    device: cpu
    input_mode: both
    input_modes: [both, query-features, embedding]

retrieval:
  dense_model: all-MiniLM-L6-v2
  graph_max_hops: 2
  graph_bidirectional: true
  graph_entity_vector_top_k: 3
  graph_entity_vector_threshold: 0.5
  graph_local_pred_weight: 0.55
  graph_bundle_pred_weight: 0.55
  graph_length_penalty: 0.04

generation:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 512
  prompt_file: prompts/generator.txt
  include_graph_provenance: false
  completion_window: 24h
  batch_max_requests: 2000

e2e:
  run_id: null
  split: test
  policy: learned-soft
  policies: [dense-only, graph-only, 50-50, learned-soft, learned-hard]
  fusion_keep_k: 25
  reranker: cross_encoder
  rerank_top_k: 5
  cross_encoder_model: null
  router_device: cpu
  router_input_mode: both
  router_inference_batch_size: 32
  limit: null
  only_question_ids: []
  dry_run: false
  include_graph_provenance: false
  completion_window: null

secrets:
  openai_api_key_env: OPENAI_API_KEY
  wikimedia_token_env: WIKIMEDIA_OAUTH2_ACCESS_TOKEN
