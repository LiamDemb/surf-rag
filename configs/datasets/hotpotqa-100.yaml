# Named E2E eval run: set run_id to something stable for your paper / slides.
schema_version: surf-rag/pipeline/v1
experiment_id: graph-trace
seed: 42

paths:
    data_base: data
    benchmark_base: data/benchmarks
    router_base: data/router
    benchmark_name: hotpotqa
    benchmark_id: "100"
    router_id: 4000-test
    hf_home: null
    transformers_cache: null

raw_sources:
    nq_path: null
    wiki2_path: null
    hotpotqa_path: data/raw/hotpotqa/hotpotqa_100.jsonl

model_setup:
    embedding_model: all-MiniLM-L6-v2
    cross_encoder_model: cross-encoder/ms-marco-MiniLM-L-12-v2

corpus:
    max_pages: 12
    max_hops: 2
    chunk_min_tokens: 500
    chunk_max_tokens: 800
    chunk_overlap_tokens: 100
    fetch_missing: false
alignment: { full_report: false, keep_unresolved: false }
entity_matching:
    {
        build_artifacts: true,
        force: false,
        max_df: 8,
        max_per_query: 12,
        min_key_len: 3,
    }
oracle: {}
router: { dataset: {}, train: {} }
retrieval: {}
generation:
    model: gpt-4.1-mini
    max_tokens: 512
    temperature: 0.0
    prompt_file: prompts/generator_simplified.txt
    completion_window: 24h
    batch_max_requests: 2000
    include_graph_provenance: true

e2e:
    run_id: graph-trace
    split: test
    policy: learned-soft
    branch_top_k: 20
    fusion_keep_k: 20
    reranker: cross_encoder
    rerank_top_k: 10
    sentence_rerank_enabled: true
    sentence_rerank_top_k: 20
    sentence_rerank_max_sentences: 64
    sentence_rerank_max_words: 1400
    sentence_rerank_include_title: true
    sentence_rerank_prompt_style: structured
    router_device: cpu
    router_input_mode: both
    router_inference_batch_size: 32
    limit: null
    dry_run: false

secrets:
    openai_api_key_env: OPENAI_API_KEY
